<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brok3n by Design</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000;
    }

    video {
      max-width: 88%;
      max-height: 88%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .enter-btn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 55px;
      font-size: 1.5rem;
      background: transparent;
      border: 2px solid #00ff9f;
      color: #00ff9f;
      font-family: "Courier New", monospace;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .enter-btn.show {
      opacity: 1;
      pointer-events: auto;
    }

    .enter-btn:hover {
      background-color: #00ff9f;
      color: #000;
    }

    .sound-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      background: transparent;
      border: 1px solid #00ff9f;
      color: #00ff9f;
      padding: 8px 16px;
      font-family: "Courier New", monospace;
      cursor: pointer;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="splashVideo" autoplay muted loop playsinline>
      <source src="videos/BrokenIntro.mp4" type="video/mp4">
    </video>

    <button class="enter-btn" id="enterBtn" onclick="enterSite()">
      ENTER
    </button>

    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">
      SOUND: OFF
    </button>
  </div>

  <script>
    const video = document.getElementById('splashVideo');
    const enterBtn = document.getElementById('enterBtn');
    const soundBtn = document.getElementById('soundBtn');

    // Show Enter button after 7 seconds
    setTimeout(() => {
      enterBtn.classList.add('show');
    }, 7000);

    function enterSite() {
      window.location.href = "home.html";
    }

    // Sound toggle
    function toggleSound() {
      if (video.muted) {
        video.muted = false;
        soundBtn.textContent = "SOUND: ON";
      } else {
        video.muted = true;
        soundBtn.textContent = "SOUND: OFF";
      }
    }
  </script>

</body>
</html>
