<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brok3n by Design</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      color: #00ff9f;
      font-family: "VT323", "Courier New", monospace;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.1) saturate(1.1);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
    }

    .title {
      font-size: 4.5rem;
      margin: 0;
      text-shadow: 0 0 20px #00ff9f;
      letter-spacing: 6px;
    }

    .tagline {
      font-size: 1.8rem;
      margin-top: 10px;
      opacity: 0.9;
    }

    .enter-btn {
      margin-top: 60px;
      padding: 18px 60px;
      font-size: 1.8rem;
      background: transparent;
      border: 2px solid #00ff9f;
      color: #00ff9f;
      font-family: "VT323", monospace;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .enter-btn.show {
      opacity: 1;
      pointer-events: auto;
    }

    .enter-btn:hover {
      background-color: #00ff9f;
      color: #0a0a0a;
    }

    .scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        transparent,
        transparent 4px,
        rgba(0, 255, 159, 0.06) 4px,
        rgba(0, 255, 159, 0.06) 8px
      );
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <!-- Replace splash.mp4 with your actual video file -->
    <video id="splashVideo" autoplay muted playsinline>
      <source src="Brokenintro.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <h1 class="title">BROK3N BY DESIGN</h1>
      <p class="tagline">It's in the algorithm, probably.</p>

      <button class="enter-btn" id="enterBtn" onclick="enterSite()">
        ENTER
      </button>
    </div>

    <div class="scanlines"></div>
  </div>

  <script>
    const enterBtn = document.getElementById('enterBtn');

    // Show Enter button after 10 seconds
    setTimeout(() => {
      enterBtn.classList.add('show');
    }, 10000);

    function enterSite() {
      window.location.href = "home.html";
    }

    // Optional: Allow pressing Enter key after button appears
    document.addElementById('splashVideo').addEventListener('ended', () => {
      enterBtn.classList.add('show');
    });
  </script>

</body>
</html>
