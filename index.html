<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brok3n by Design</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    body {
      background-color: #0a0a0a;
      color: #00ff9f;
      font-family: "VT323", "Courier New", monospace;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }
    .terminal {
      background-color: #111;
      border: 3px solid #00ff9f;
      padding: 40px;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0, 255, 159, 0.4);
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #00ff9f;
    }
    video {
      max-width: 100%;
      border: 2px solid #00ff9f;
      margin-bottom: 30px;
    }
    .enter-btn {
      background: none;
      border: 2px solid #00ff9f;
      color: #00ff9f;
      font-family: "VT323", monospace;
      font-size: 1.8rem;
      padding: 15px 40px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .enter-btn:hover {
      background-color: #00ff9f;
      color: #0a0a0a;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <h1>BROK3N BY DESIGN</h1>
    
    <!-- Replace "splash.mp4" with your actual video file name -->
    <video id="splashVideo" width="640" autoplay muted playsinline>
      <source src="splash.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <br>
    <button class="enter-btn" onclick="enterSite()">ENTER</button>
  </div>

  <script>
    function enterSite() {
      window.location.href = "home.html";
    }

    // Optional: Auto redirect after video ends
    const video = document.getElementById('splashVideo');
    video.onended = function() {
      // Uncomment the line below if you want it to auto-enter after video finishes
      // enterSite();
    };
  </script>
</body>
</html>
